<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="jentic icon">
  <style>
    .hex-main  { fill: #185FA5; }
    .hex-mid   { fill: #185FA5; opacity: .48; }
    .hex-pale  { fill: #185FA5; opacity: .22; }
    .core-ring { fill: #E6F1FB; }
    .core-dot  { fill: #0C447C; }
    @media (prefers-color-scheme: dark) {
      .hex-main  { fill: #378ADD; }
      .hex-mid   { fill: #378ADD; opacity: .52; }
      .hex-pale  { fill: #378ADD; opacity: .26; }
      .core-ring { fill: #042C53; }
      .core-dot  { fill: #85B7EB; }
    }
  </style>
  <!--
    Flat-top hexagon formula — center(cx,cy) radius r, h=r*sqrt(3)/2:
    points="cx+r,cy  cx+r/2,cy+h  cx-r/2,cy+h  cx-r,cy  cx-r/2,cy-h  cx+r/2,cy-h"
    All three polygons verified within viewBox 0 0 48 48.
  -->

  <!-- Main hex: center(20,26) r=14 h=12.1  → x:6..34  y:13.9..38.1 -->
  <polygon class="hex-main"
    points="34,26 27,38.1 13,38.1 6,26 13,13.9 27,13.9"/>

  <!-- Accent top-right: center(37,14) r=9 h=7.8  → x:28..46  y:6.2..21.8 -->
  <polygon class="hex-mid"
    points="46,14 41.5,21.8 32.5,21.8 28,14 32.5,6.2 41.5,6.2"/>

  <!-- Accent bottom-right: center(37,36) r=8 h=6.9  → x:29..45  y:29.1..42.9 -->
  <polygon class="hex-pale"
    points="45,36 41,42.9 33,42.9 29,36 33,29.1 41,29.1"/>

  <!-- Core mark on main hex -->
  <circle class="core-ring" cx="20" cy="26" r="5.5"/>
  <circle class="core-dot"  cx="20" cy="26" r="2.5"/>
</svg>
