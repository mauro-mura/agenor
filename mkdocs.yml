site_name: Jentic Framework
site_url: https://jentic.dev/docs
site_description: Java meets Agentic — enterprise-grade agent framework for the JVM
site_author: Jentic Team
repo_url: https://github.com/mauro-mura/jentic
repo_name: mauro-mura/jentic

theme:
  name: material
  logo: assets/jentic-icon.svg
  favicon: assets/jentic-icon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search

# ADRs are excluded — kept only in the repository for internal reference
exclude_docs: |
  adr/

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - toc:
      permalink: true

validation:
  nav:
    omitted_files: ignore

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Agent Development: agent-development.md
  - Behaviors:
    - Overview: behaviors/README.md
    - Cyclic: behaviors/CyclicBehavior.md
    - OneShot: behaviors/OneShotBehavior.md
    - Waker: behaviors/WakerBehavior.md
    - Scheduled: behaviors/ScheduledBehavior.md
    - EventDriven: behaviors/EventDrivenBehavior.md
    - FSM: behaviors/FSMBehavior.md
    - Conditional: behaviors/ConditionalBehavior.md
    - Sequential: behaviors/SequentialBehavior.md
    - Parallel: behaviors/ParallelBehavior.md
    - Pipeline: behaviors/PipelineBehavior.md
    - Batch: behaviors/BatchBehavior.md
    - Retry: behaviors/RetryBehavior.md
    - Throttled: behaviors/ThrottledBehavior.md
    - CircuitBreaker: behaviors/CircuitBreakerBehavior.md
    - Reflection: behaviors/ReflectionBehavior.md
    - Human-In-The-Loop: behaviors/hitl.md
  - Messaging & Directory:
    - Messaging Guide: messaging.md
    - Agent Directory: directory.md
    - Message Filtering: message-filtering.md
    - Dialog Protocol: dialog-protocol.md
  - LLM Integration:
    - Overview: llm-integration.md
    - Memory Management: memory.md
    - Agent State Persistence: persistence.md
    - Guardrails: guardrails.md
  - Adapters:
    - MCP: adapters/mcp.md
    - Redis Messaging: adapters/redis.md
    - JDBC Directory: adapters/jdbc-directory.md
  - Observability:
    - OpenTelemetry: observability.md
  - Integrations:
    - Spring Boot Starter: spring-boot-starter.md
